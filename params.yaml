data_ingestion:

  source: "1M youtube_comments_cleaned.csv"
  output_dir: "data/raw"
  random_state: 42


data_preprocessing:

  input_path: "data/raw/cleaned_data.parquet"
  output_dir: "data/processed"
  test_size: 0.10
  val_size: 0.10
  random_state: 42

feature_engineering:

  train_path: "data/processed/train.parquet"

  val_path: "data/processed/val.parquet"

  test_path: "data/processed/test.parquet"

  model_name: "cardiffnlp/twitter-roberta-base-sentiment-latest"

  output_dir: "artifacts/features"




training:

  model_name: "artifacts/backbone"

  output_dir: "artifacts/models"

  max_length: 192

  freeze_layers: 4

  epochs: 6

  patience: 2

  resume: false

  loss_type: "weighted_ce"

  focal_gamma: 2.0

  lr_head: 0.0003
  lr_backbone: 0.00001

  layer_decay: 0.95

  weight_decay: 0.01

  warmup_ratio: 0.03

  train_sample_size: 250000